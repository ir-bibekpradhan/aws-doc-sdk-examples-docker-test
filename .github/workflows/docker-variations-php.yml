name: Docker Variation Tests - PHP

on:
  workflow_dispatch:

jobs:
  build_php_variations:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "01-simple-single-stage"
            complexity: "LOW"
          - variation: "02-phpfpm-nginx"
            complexity: "MEDIUM"
          - variation: "03-alpine-php-cli"
            complexity: "LOW-MEDIUM"
          - variation: "04-multi-stage"
            complexity: "MEDIUM"
          - variation: "05-non-root-user"
            complexity: "MEDIUM"
          - variation: "06-arg-env-config"
            complexity: "LOW-MEDIUM"
          - variation: "07-healthcheck"
            complexity: "MEDIUM"
          - variation: "08-buildkit-composer-cache"
            complexity: "MEDIUM-HIGH"
          - variation: "09-dev-xdebug"
            complexity: "MEDIUM"
          - variation: "10-opcache-production"
            complexity: "MEDIUM"
          - variation: "11-ci-runner-awscli"
            complexity: "MEDIUM-HIGH"
          - variation: "12-multi-stage-nonroot-healthcheck"
            complexity: "HIGH"
          - variation: "13-php-extensions-labels"
            complexity: "MEDIUM"
          - variation: "14-readonly-filesystem"
            complexity: "HIGH"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"

    steps:
      - name: Check out the repo
        uses: actions/checkout@v3

      - name: "Build PHP Dockerfile.${{ matrix.variation }} [complexity=${{ matrix.complexity }}]"
        run: |
          docker build \
            -t php-variation-${{ matrix.variation }} \
            -f ./docker-test-variations/php/Dockerfile.${{ matrix.variation }} \
            .
