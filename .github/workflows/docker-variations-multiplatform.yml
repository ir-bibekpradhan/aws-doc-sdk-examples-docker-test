name: Docker Variation Tests - Multi-Platform linux/amd64 + linux/arm64 (Scripts)

on:
  workflow_dispatch:
    inputs:
      language:
        description: "Language to test"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - ruby
          - python
          - javascript
          - go
          - dotnet
          - java
          - php

# ─────────────────────────────────────────────────────────────────────────────
# Same as docker-variations-multiplatform.yml but uses direct shell/docker
# commands instead of reusable actions (no `uses:` steps).
# Builds for linux/amd64 AND linux/arm64 simultaneously using QEMU emulation
# and Docker Buildx.  Images are built but not pushed to any registry.
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ──────────────────────────────────────────────────────
  # RUBY
  # ──────────────────────────────────────────────────────
  ruby_multiplatform:
    if: ${{ github.event.inputs.language == 'all' || github.event.inputs.language == 'ruby' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "02-multi-stage"
            complexity: "LOW-MEDIUM"
          - variation: "07-alpine-minimal"
            complexity: "MEDIUM"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      # ============= InvisiRisk Setup =============
      - name: Setup PSE
        uses: invisirisk/pse-action@develop
        with:
          api_url: "https://app.stage.invisirisk.com"
          app_token: ${{secrets.IR_API_KEY}}
          mode: docker-intercept
      # ============= InvisiRisk Setup End =============
      - name: Checkout
        run: |
          git init
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch --depth=1 origin ${{ github.sha }}
          git checkout FETCH_HEAD
      - name: Set up QEMU
        run: docker run --privileged --rm tonistiigi/binfmt --install all
      - name: Set up Docker Buildx
        run: |
          docker buildx create --name multiplatform-builder --use
          docker buildx inspect --bootstrap
      - name: "Ruby | Dockerfile.${{ matrix.variation }} [platforms=amd64+arm64, complexity=${{ matrix.complexity }}]"
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file ./docker-test-variations/ruby/Dockerfile.${{ matrix.variation }} \
            --tag ruby-multiplatform-${{ matrix.variation }}:latest \
            --output type=image,push=false \
            --build-arg BUILDKIT_SYNTAX=public.ecr.aws/w3c0c0n7/invisirisk/baf-buildkit:dev-test \
            --secret id=pse-ca,src=/etc/ssl/certs/pse.pem \
            --build-arg PSE_PROXY=http://${PSE_PROXY_IP}:3128 \
            .
      # ============= InvisiRisk Cleanup =============
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@develop
        with:
          cleanup: "true"
      # ============= InvisiRisk Cleanup End =============

  # ──────────────────────────────────────────────────────
  # PYTHON
  # ──────────────────────────────────────────────────────
  python_multiplatform:
    if: ${{ github.event.inputs.language == 'all' || github.event.inputs.language == 'python' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "02-slim-base"
            complexity: "LOW"
          - variation: "05-non-root-user"
            complexity: "MEDIUM"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      # ============= InvisiRisk Setup =============
      - name: Setup PSE
        uses: invisirisk/pse-action@develop
        with:
          api_url: "https://app.stage.invisirisk.com"
          app_token: ${{secrets.IR_API_KEY}}
          mode: docker-intercept
      # ============= InvisiRisk Setup End =============
      - name: Checkout
        run: |
          git init
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch --depth=1 origin ${{ github.sha }}
          git checkout FETCH_HEAD
      - name: Set up QEMU
        run: docker run --privileged --rm tonistiigi/binfmt --install all
      - name: Set up Docker Buildx
        run: |
          docker buildx create --name multiplatform-builder --use
          docker buildx inspect --bootstrap
      - name: "Python | Dockerfile.${{ matrix.variation }} [platforms=amd64+arm64, complexity=${{ matrix.complexity }}]"
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file ./docker-test-variations/python/Dockerfile.${{ matrix.variation }} \
            --tag python-multiplatform-${{ matrix.variation }}:latest \
            --output type=image,push=false \
            --build-arg BUILDKIT_SYNTAX=public.ecr.aws/w3c0c0n7/invisirisk/baf-buildkit:dev-test \
            --secret id=pse-ca,src=/etc/ssl/certs/pse.pem \
            --build-arg PSE_PROXY=http://${PSE_PROXY_IP}:3128 \
            .
      # ============= InvisiRisk Cleanup =============
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@develop
        with:
          cleanup: "true"
      # ============= InvisiRisk Cleanup End =============

  # ──────────────────────────────────────────────────────
  # JAVASCRIPT
  # ──────────────────────────────────────────────────────
  javascript_multiplatform:
    if: ${{ github.event.inputs.language == 'all' || github.event.inputs.language == 'javascript' }}
