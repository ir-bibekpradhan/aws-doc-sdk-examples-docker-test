          git fetch --depth=1 origin ${{ github.sha }}
          git checkout FETCH_HEAD
      - name: Set up QEMU
        run: docker run --privileged --rm tonistiigi/binfmt --install all
      - name: Set up Docker Buildx
        run: |
          docker buildx create --name multiplatform-builder --use
          docker buildx inspect --bootstrap
      - name: "JavaScript | Dockerfile.${{ matrix.variation }} [platforms=amd64+arm64, complexity=${{ matrix.complexity }}]"
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file ./docker-test-variations/javascript/Dockerfile.${{ matrix.variation }} \
            --tag javascript-multiplatform-${{ matrix.variation }}:latest \
            --output type=image,push=false \
            --build-arg BUILDKIT_SYNTAX=public.ecr.aws/w3c0c0n7/invisirisk/baf-buildkit:dev-test \
            --secret id=pse-ca,src=/etc/ssl/certs/pse.pem \
            --build-arg PSE_PROXY=http://${PSE_PROXY_IP}:3128 \
            .
      # ============= InvisiRisk Cleanup =============
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@develop
        with:
          cleanup: "true"
      # ============= InvisiRisk Cleanup End =============

  # ──────────────────────────────────────────────────────
  # GO
  # ──────────────────────────────────────────────────────
  go_multiplatform:
    if: ${{ github.event.inputs.language == 'all' || github.event.inputs.language == 'go' }}
