            --secret id=pse-ca,src=/etc/ssl/certs/pse.pem \
            --build-arg PSE_PROXY=http://${PSE_PROXY_IP}:3128 \
            .
      # ============= InvisiRisk Cleanup =============
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@develop
        with:
          cleanup: "true"
      # ============= InvisiRisk Cleanup End =============

  # ──────────────────────────────────────────────────────
  # .NET
  # ──────────────────────────────────────────────────────
  dotnet_multiplatform:
    if: ${{ github.event.inputs.language == 'all' || github.event.inputs.language == 'dotnet' }}
