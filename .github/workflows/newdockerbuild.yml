name: new docker build
on:
  workflow_dispatch:

jobs:
  build_ruby_buildpush_action:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variation: "02-multi-stage"
            complexity: "LOW-MEDIUM"
          - variation: "04-non-root-user"
            complexity: "MEDIUM"
          - variation: "06-healthcheck"
            complexity: "MEDIUM"
          - variation: "09-layer-cache-optimised"
            complexity: "MEDIUM"
          - variation: "15-full-production-grade"
            complexity: "HIGHEST"
    steps:
      # ============= InvisiRisk Setup =============
      - name: Setup PSE
        uses: invisirisk/pse-action@develop
        with:
          api_url: "https://app.stage.invisirisk.com"
          app_token: ${{ secrets.IR_API_KEY }}
          mode: docker-intercept
      # ============= InvisiRisk Setup End =============
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: "Ruby | Dockerfile.${{ matrix.variation }} [complexity=${{ matrix.complexity }}]"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker-test-variations/ruby/Dockerfile.${{ matrix.variation }}
          push: false
          load: true
          tags: ruby-action-${{ matrix.variation }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
           BUILDKIT_SYNTAX=kkisalaya/pse-frontend:latest
           PSE_PROXY=http://${{ PSE_PROXY_IP }}:3128

          # --secret id=pse-ca,src=/etc/ssl/certs/pse.pem
          # Option A: if the PEM is already on the runner at that path:
          secret-files: |
            pse-ca=/etc/ssl/certs/pse.pem
      # ============= InvisiRisk Cleanup =============
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@develop
        with:
          cleanup: "true"
      # ============= InvisiRisk Cleanup End =============
